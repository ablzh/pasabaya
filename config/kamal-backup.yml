app: pasabaya
accessory: backup
databases:
  - name: primary
    adapter: sqlite
    path: /rails/storage/production.sqlite3
  - name: cache
    adapter: sqlite
    path: /rails/storage/production_cache.sqlite3
  - name: queue
    adapter: sqlite
    path: /rails/storage/production_queue.sqlite3
  - name: cable
    adapter: sqlite
    path: /rails/storage/production_cable.sqlite3
paths:
  - /rails/storage
restic:
  repository:
    secret: RESTIC_REPOSITORY
  password:
    secret: RESTIC_PASSWORD
  init_if_missing: true
  check_after_backup: true
  forget_after_backup: true
  retention:
    keep_last: 7
    keep_daily: 7
    keep_weekly: 4
    keep_monthly: 6
    keep_yearly: 2
backup:
  schedule: 1d
